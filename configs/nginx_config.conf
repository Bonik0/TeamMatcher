server {
    listen 8080;
    location /api {

        location /api/email {
            proxy_pass http://email-service:8000;
        }

        location /api/auth {
            proxy_pass http://auth-service:8000;
        }

        location /api/project {
            proxy_pass http://project-service:8000;
        }

        location /api/search {
            proxy_pass http://search-service:8000;
        }

        location /api/user {
            proxy_pass http://user-service:8000;
        }
    }
}